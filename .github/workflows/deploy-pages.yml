name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build -- --base=/water3d/
        working-directory: frontend
        # No proxy on GitHub Pages — call every upstream directly. Open-Meteo,
        # Esri, and Nominatim send CORS headers; the two Idaho services
        # (gridMET, CFS) currently do NOT, so those requests will be blocked by
        # the browser until NKN enables CORS or a proxy fronts them.
        env:
          VITE_GRIDMET_PROXY_BASE_URL: https://toolbox-webservices.nkn.uidaho.edu
          VITE_CLIMATE_TOOLBOX_ENABLED: "true"
          VITE_CLIMATE_TOOLBOX_CFS_PROXY_BASE_URL: https://climate-dev.nkn.uidaho.edu
          VITE_OPEN_METEO_ARCHIVE_PROXY_BASE_URL: https://archive-api.open-meteo.com
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist
      - id: deployment
        uses: actions/deploy-pages@v4
