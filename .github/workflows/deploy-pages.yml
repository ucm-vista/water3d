name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build -- --base=/water3d/
        working-directory: frontend
        # The two Idaho services send no CORS headers and 503 direct browser
        # bursts, so they're reached via the CORS-enabled proxy on
        # w3d.ucmerced.edu (host_router repo). Open-Meteo, Esri, and Nominatim
        # send CORS headers and are called directly.
        env:
          VITE_GRIDMET_PROXY_BASE_URL: https://w3d.ucmerced.edu/api/gridmet
          VITE_CLIMATE_TOOLBOX_ENABLED: "true"
          VITE_CLIMATE_TOOLBOX_CFS_PROXY_BASE_URL: https://w3d.ucmerced.edu/api/climate-toolbox
          VITE_OPEN_METEO_ARCHIVE_PROXY_BASE_URL: https://archive-api.open-meteo.com
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist
      - id: deployment
        uses: actions/deploy-pages@v4
