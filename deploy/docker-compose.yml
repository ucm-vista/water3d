# Production stack for Water 3D — Traefik edge on the *.vistacompute1.ucmerced.edu
# wildcard.
#
#   traefik      TLS (wildcard cert) + routing. Any *.vistacompute1.ucmerced.edu
#                host reaches the app. Weather-API proxies and shared middlewares
#                live in traefik/dynamic.yml; the SPA router is the labels below.
#   web          nginx serving the static SPA bundle (baked at build time).
#
# Setup (standalone box — this stack owns ports 80/443):
#   cp ../frontend/.env.production.example ../frontend/.env.production
#   #  drop the wildcard cert into deploy/certs/ (vistacompute1.crt + vistacompute1.key)
#   docker compose --profile standalone up -d --build
#
# Setup (vistacompute1 — shared edge Traefik already owns 80/443):
#   docker compose -f docker-compose.yml -f docker-compose.vistacompute1.yml up -d --build
#
# DNS: point the app's chosen name (e.g. water3d.vistacompute1.ucmerced.edu) at
# this server; open ports 80 + 443.

name: water3d

services:
  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    # Standalone boxes only: docker compose --profile standalone up. On hosts
    # that already run a shared edge Traefik bound to 80/443 (vistacompute1),
    # skip this service and layer docker-compose.vistacompute1.yml on top.
    profiles: ["standalone"]
    command:
      - "--configFile=/etc/traefik/traefik.yml"
      # --- TLS alternative: Let's Encrypt HTTP-01 (per-hostname certs only, NOT
      #     wildcard). If vistacompute1 is public and you'd rather auto-issue a
      #     cert for one specific host than provide a wildcard cert, uncomment
      #     these, pin the `web` router rule to that Host(), and re-add the
      #     `...tls.certresolver=letsencrypt` labels. See deploy/README.md.
      # - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      # - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      # - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
      # Traefik dashboard — host loopback ONLY, never public.
      #   ssh -L 8080:localhost:8080 <server>  →  http://localhost:8080/dashboard/
      - "127.0.0.1:8080:8080"
    volumes:
      # Read-only docker socket: how Traefik discovers the web labels.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      # Wildcard cert for *.vistacompute1.ucmerced.edu (see deploy/certs/).
      - ./certs:/certs:ro
      # - traefik_letsencrypt:/letsencrypt   # only needed for the ACME alternative
    networks: [edge]

  web:
    build:
      # Repo root — the image needs the frontend source.
      context: ..
      dockerfile: deploy/Dockerfile
    image: water3d-web:latest
    restart: unless-stopped
    networks: [edge]
    labels:
      - "traefik.enable=true"
      # SPA catch-all for ANY host in the wildcard zone. Lowest priority so the
      # /api/* proxies win. To pin the app to a single subdomain instead,
      # replace the rule with:  Host(`water3d.vistacompute1.ucmerced.edu`)
      - 'traefik.http.routers.w3d-web.rule=HostRegexp(`^[a-zA-Z0-9-]+\.vistacompute1\.ucmerced\.edu$`)'
      - "traefik.http.routers.w3d-web.priority=1"
      - "traefik.http.routers.w3d-web.entrypoints=websecure"
      - "traefik.http.routers.w3d-web.tls=true"
      - "traefik.http.routers.w3d-web.middlewares=security-headers@file,gzip@file"
      - "traefik.http.services.w3d-web.loadbalancer.server.port=80"

networks:
  edge:
    name: water3d_edge
    ipam:
      config:
        # Pinned: Docker's default pool hands out 172.x subnets that collide
        # with the campus VPN (172.28.0.0/16). Host convention is 192.168.10x/24.
        - subnet: 192.168.105.0/24

# volumes:
#   traefik_letsencrypt:   # only needed for the ACME (Let's Encrypt) alternative
