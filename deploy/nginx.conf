# nginx serving the Water 3D SPA bundle. TLS, gzip, security headers, the
# /api/* weather proxies are all handled upstream by
# Traefik — this just serves the static files with SPA history-fallback.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
